<button id="sidebarCloseBtn" class="ghost-btn" title="Toggle sidebar">

              <line x1="0" y1="1" x2="16" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="0" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

            </svg>
          </button>
        </div>
      </div>
      <div class="sidebar-content">
        <ul id="fileList" class="file-list"></ul>
        <div class="sidebar-footer"></div>
      </div>
    </div>

    <div id="main">
      <div id="toolbar">
        <button id="sidebarToggleBtn" class="ghost-btn" title="Toggle sidebar">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">

        </button>

      </div>
      <div class="path-center"><div class="path-center-inner"><span id="dirtyDot" title="Unsaved changes"></span><span class="path" id="currentPath">No file selected</span></div></div>

      <div id="content">
        <div id="preview" tabindex="-1"></div>
        <div id="backlinks" style="display:none"></div>
        <textarea id="editor" style="display:none"></textarea>
      </div>
    </div>
  </div>

  <!-- Keyboard Shortcuts Modal -->

  <div id="prompt-overlay">

      <input id="prompt-input" type="text" autocomplete="off">
